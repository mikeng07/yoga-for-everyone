<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YogaRx</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Upload View -->
    <div id="upload-view">
      <div class="upload-page">

        <!-- Header -->
        <div class="upload-header">
          <h1>YogaRx</h1>
          <p class="tagline">Tell us about yourself and upload your doctor's note — we'll generate a personalized yoga plan for your back.</p>
        </div>

        <!-- Two columns -->
        <div class="upload-columns">

          <!-- Left: Patient context form -->
          <div class="upload-panel">
            <h2 class="panel-title">About You</h2>

            <div class="form-row">
              <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender">
                  <option value="">Select...</option>
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                  <option value="other">Other</option>
                  <option value="prefer_not">Prefer not to say</option>
                </select>
              </div>
              <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" placeholder="e.g. 35" min="1" max="120" />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="height">Height (ft)</label>
                <input type="number" id="height" placeholder="e.g. 5.8" min="1" max="9" step="0.1" />
              </div>
              <div class="form-group">
                <label for="weight">Weight (lbs)</label>
                <input type="number" id="weight" placeholder="e.g. 154" min="44" max="660" />
              </div>
            </div>

            <div class="form-group">
              <label for="pain-level">Pain Level: <span id="pain-value">5</span>/10</label>
              <input type="range" id="pain-level" min="1" max="10" value="5" />
            </div>

            <div class="form-group">
              <label for="description">How are you feeling?</label>
              <textarea id="description" rows="4" placeholder="Describe your current pain or discomfort, e.g. sharp pain in lower left back when sitting..."></textarea>
            </div>
          </div>

          <!-- Right: Doctor note upload -->
          <div class="upload-panel">
            <h2 class="panel-title">Doctor's Note</h2>
            <div class="drop-zone" id="drop-zone">
              <span class="drop-icon">📄</span>
              <p>Drag & drop your PDF here</p>
              <p class="drop-sub">or</p>
              <label class="file-label" for="file-input">Choose File</label>
              <input type="file" id="file-input" accept=".pdf" hidden />
              <p class="file-name" id="file-name">No file selected</p>
            </div>
          </div>

        </div>

        <button class="generate-btn" id="generate-btn">Generate My Yoga Plan</button>
      </div>
    </div>

    <!-- Loading View (hidden by default) -->
    <div id="loading-view" hidden>
      <div class="loading-container">
        <div class="spinner"></div>
        <p>Analyzing your doctor's note...</p>
      </div>
    </div>

    <!-- Results View (hidden by default, populated by JS) -->
    <div id="results-view" hidden>
      <div class="results-container">
        <div id="diagnosis-card" class="diagnosis-card"></div>
        <h2 class="poses-heading">Your Yoga Plan</h2>
        <div id="poses-grid" class="poses-grid"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
